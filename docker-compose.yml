services:
  postgres:
    image: postgres:16-alpine
    container_name: boldmeet-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: boldmeet
      POSTGRES_PASSWORD: boldmeet_dev
      POSTGRES_DB: boldmeet
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
