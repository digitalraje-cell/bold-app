# Railway config for @boldmeet/web
# Set service "Root Directory" to "/" (repo root) — NOT apps/web.
# In Railway UI: Settings → Config-as-code → path: /apps/web/railway.toml

[build]
builder = "NIXPACKS"
buildCommand = "bash scripts/railway-build-web.sh"
watchPatterns = [
  "apps/web/**",
  "packages/shared/**",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "package.json",
  "scripts/railway-build-web.sh",
]

[deploy]
startCommand = "bash scripts/railway-start-web.sh"
healthcheckPath = "/api/auth/status"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

# Required Railway WEB env vars:
# AUTH_SECRET (or NEXTAUTH_SECRET) — session signing
# NEXT_PUBLIC_APP_URL=https://bold.robozant.com
# NEXT_PUBLIC_APP_DOMAIN=bold.robozant.com
# AUTH_URL + NEXTAUTH_URL — https://bold.robozant.com
# DATABASE_URL — same Postgres as API (NextAuth + Prisma on web)
# JWT_SECRET — must match API service
# API_URL — Railway API service public URL (required for /api/backend proxy + SSR meeting preview)
#   Example: https://boldmeetapi-production.up.railway.app  (no trailing /api)
# NEXT_PUBLIC_API_URL — inlined at build; defaults from API_URL in railway-build-web.sh
# NEXT_PUBLIC_SOCKET_URL — Socket.IO origin; production: https://boldmeetapi-production.up.railway.app
# RESEND_API_KEY, EMAIL_FROM — OTP email delivery
# NEXT_PUBLIC_ENABLE_YOUTUBE_LIVE=true — YouTube Live in meetings (default: enabled)
