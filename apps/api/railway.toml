# Railway config for @boldmeet/api
# Set service "Root Directory" to "/" (repo root) — NOT apps/api.
# In Railway UI: Settings → Config-as-code → path: /apps/api/railway.toml

[build]
builder = "NIXPACKS"
buildCommand = "bash scripts/railway-build-api.sh"
watchPatterns = [
  "apps/api/**",
  "packages/shared/**",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "package.json",
  "scripts/railway-build-api.sh",
]

[deploy]
startCommand = "bash scripts/railway-start-api.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

# Required Railway env vars (Settings → Variables):
# DATABASE_URL, JWT_SECRET (or AUTH_SECRET), ENCRYPTION_KEY, NODE_ENV=production
# CORS_ORIGIN=https://bold.robozant.com
# AUTH_URL=https://bold.robozant.com (optional; also added to allowed origins)
# Railway sets PORT automatically — do not hardcode it.
